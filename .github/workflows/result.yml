name: Scrape Race Results

on:
  schedule:
    # JST 23:00 = UTC 14:00
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日付 (YYYY-MM-DD, 省略時は JST 当日)'
        required: false
        type: string

concurrency:
  group: result
  cancel-in-progress: false

jobs:
  result:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run result scraper
        uses: nick-fields/retry@v3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_DELAY_MS: ${{ secrets.SCRAPE_DELAY_MS || '500' }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx tsx scripts/scrape.ts "result" "${{ inputs.target_date || '' }}"
