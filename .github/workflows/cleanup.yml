name: Cleanup Old Data

on:
  schedule:
    # JST AM07:00 = UTC 22:00 (前日)
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run cleanup
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx tsx scripts/cleanup.ts

      - name: Notify on failure
        if: failure() && secrets.NOTIFY_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.NOTIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ [Cleanup Old Data] #${{ github.run_number }} failed\\n${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}\"}"
        continue-on-error: true
