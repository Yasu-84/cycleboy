name: Run AI Prediction

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日付 (YYYY-MM-DD, 省略時は JST 当日)'
        required: false
        type: string

concurrency:
  group: prediction
  cancel-in-progress: false

jobs:
  prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run prediction
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-1.5-flash' }}
          GEM_SYSTEM_PROMPT: ${{ secrets.GEM_SYSTEM_PROMPT }}
        with:
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 60
          command: npx tsx scripts/scrape.ts prediction "${{ inputs.target_date || '' }}"

      - name: Notify on failure
        if: failure()
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$NOTIFY_WEBHOOK_URL" ]; then
            curl -s -X POST "$NOTIFY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"❌ [Run AI Prediction] #${{ github.run_number }} failed\\n${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}\"}"
          fi
        continue-on-error: true
