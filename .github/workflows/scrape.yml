name: Scrape Race Data

on:
  schedule:
    # JST AM05:15 = UTC 20:15 (前日)
    - cron: '15 20 * * *'
  workflow_dispatch:
    inputs:
      step:
        description: '実行ステップ (all / schedule / program / entry / result)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - schedule
          - program
          - entry
          - result
      target_date:
        description: '対象日付 (YYYY-MM-DD, 省略時は JST 当日)'
        required: false
        type: string

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_DELAY_MS: ${{ secrets.SCRAPE_DELAY_MS || '500' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-1.5-flash' }}
          GEM_SYSTEM_PROMPT: ${{ secrets.GEM_SYSTEM_PROMPT }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx tsx scripts/scrape.ts "${{ inputs.step || 'all' }}" "${{ inputs.target_date || '' }}"

      - name: Notify on failure
        if: ${{ failure() && secrets.NOTIFY_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.NOTIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ [Scrape Race Data] #${{ github.run_number }} failed\\n${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}\"}"
        continue-on-error: true
